<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenToken Island Popover</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root { color-scheme: dark; --bg:#050505; --panel:#111112; --line:rgba(255,255,255,.16); --ink:#f7f7f8; --muted:rgba(247,247,248,.62); --blue:#0a84ff; --green:#30d158; --gold:#d8bf85; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif; }
    *{box-sizing:border-box} body{margin:0;width:100vw;height:100vh;min-height:0;display:grid;place-items:stretch;padding:18px;background:transparent;color:var(--ink);overflow:hidden} button{font:inherit;color:inherit;border:0;cursor:pointer}
    .panel{position:relative;width:100%;height:100%;min-height:0;padding:14px;border-radius:24px;background:linear-gradient(145deg,rgba(32,34,38,.72),rgba(18,18,20,.82));border:1px solid var(--line);box-shadow:0 30px 90px rgba(0,0,0,.46),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);overflow:hidden;isolation:isolate}
    .panel::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 36%);opacity:.55;z-index:0}
    .symbol-bg{position:absolute;right:-18px;bottom:-24px;width:122px;height:122px;overflow:hidden;opacity:.14;z-index:0;pointer-events:none;mix-blend-mode:screen;mask-image:linear-gradient(to top,#000 6%,rgba(0,0,0,.74) 58%,transparent);-webkit-mask-image:linear-gradient(to top,#000 6%,rgba(0,0,0,.74) 58%,transparent)}
    .symbol-bg img{height:122px;width:477px;object-fit:contain;object-position:left center;display:block}.content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.title{margin:0;font-size:15px;font-weight:760}.sub{margin:4px 0 0;color:var(--muted);font-size:12px;max-width:278px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.live{height:28px;display:inline-flex;align-items:center;gap:6px;padding:0 10px;border-radius:99px;background:rgba(48,209,88,.12);color:#77df8b;font-size:12px}.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(48,209,88,.14)}
    .actions{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:10px}.btn{height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:7px;padding:0 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:700}.btn.primary{background:var(--blue);color:white;border-color:rgba(10,132,255,.6);box-shadow:0 12px 34px rgba(10,132,255,.22)}.btn.icon{width:34px;padding:0}.btn svg{width:15px;height:15px}
    .hero{display:grid;grid-template-columns:1fr auto;align-items:end;gap:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);margin-bottom:10px}.label{margin:0 0 6px;color:var(--muted);font-size:12px}.value{margin:0;font-size:32px;line-height:1;font-weight:780;font-variant-numeric:tabular-nums}.rank{min-width:70px;height:44px;border-radius:15px;display:grid;place-items:center;background:#fff;color:#050505;font-size:20px;font-weight:820;font-variant-numeric:tabular-nums}
    .game{display:grid;grid-template-columns:1fr 112px;gap:10px;margin-bottom:10px}.card{border-radius:16px;padding:10px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07)}.level-line{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:10px;margin-bottom:8px;font-size:12px}.level-line strong{font-size:13px;white-space:nowrap}.level-line span{min-width:0;text-align:right;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{height:8px;border-radius:99px;background:rgba(255,255,255,.10);overflow:hidden}.bar i{display:block;height:100%;width:72%;border-radius:inherit;background:linear-gradient(90deg,var(--blue),#64d2ff)}.battle{text-align:center;display:grid;place-items:center}.battle strong{font-size:22px}.battle span{font-size:11px;color:var(--muted);line-height:1.3}.tools{display:grid;gap:6px;margin-bottom:10px}.tool{display:grid;grid-template-columns:82px 1fr 66px;align-items:center;gap:8px;padding:7px 8px;border-radius:12px;background:rgba(255,255,255,.045);font-size:12px}.tool .bar{height:7px}.tool-value{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}.quests{display:grid;gap:6px;margin-bottom:10px}.quest{display:grid;grid-template-columns:22px 1fr auto;gap:8px;align-items:center;padding:8px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07)}.quest strong{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.quest span{display:block;margin-top:2px;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.xp{font-size:12px;font-weight:760;color:var(--green);white-space:nowrap}.badges{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:auto}.badge{min-width:0;min-height:78px;border-radius:14px;padding:8px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);font-size:11px}.badge.featured{background:rgba(255,159,10,.11);border-color:rgba(255,159,10,.22)}.badge-icon{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;margin-bottom:6px;color:#ff9f0a;background:rgba(255,159,10,.12)}.badge-icon svg{width:14px;height:14px}.badge strong{display:block;font-size:11px;line-height:1.15;overflow-wrap:anywhere}.badge span{display:block;margin-top:3px;color:rgba(255,255,255,.46);line-height:1.22;overflow-wrap:anywhere}.locked{opacity:.48;filter:saturate(.45)}
  </style>
</head><body><main class="panel"><span class="symbol-bg"><img src="./assets/scys/icon_topnav.png" alt=""></span><div class="content"><header class="head"><div><p class="title">今日 OpenToken</p><p id="serviceText" class="sub">Loading opentoken service...</p></div><span class="live"><span class="dot"></span>live</span></header><div class="actions"><button id="uploadButton" class="btn primary"><i data-lucide="upload-cloud"></i><span id="uploadLabel">Upload now</span></button><button class="btn"><i data-lucide="pause"></i>Pause</button><button class="btn icon" aria-label="Open logs"><i data-lucide="file-text"></i></button></div><section class="hero"><div><p class="label">Tokens</p><p id="totalValue" class="value">--</p></div><div id="rankValue" class="rank">#--</div></section><section class="game"><div class="card"><div class="level-line"><strong>Builder Lv. 12</strong><span id="xpText">-- / 4,800 XP</span></div><div class="bar"><i id="xpFill"></i></div></div><div class="card battle"><div><strong id="rankDelta">+0</strong><span id="rankGap">排名战报<br>读取中</span></div></div></section><section id="toolList" class="tools"></section><section class="quests"><div class="quest"><i data-lucide="target"></i><div><strong>每日任务：冲到 300k</strong><span id="dailyQuestCopy">读取真实 token 数据中...</span></div><div class="xp">+620</div></div><div class="quest"><i data-lucide="timer-reset"></i><div><strong>连击任务：5 分钟内再次上传</strong><span>保持后台常驻可自动完成</span></div><div class="xp">+180</div></div></section><section class="badges"><div class="badge featured"><span class="badge-icon"><i data-lucide="flame"></i></span><strong>Hot Streak</strong><span>5 days active</span></div><div class="badge"><span class="badge-icon"><i data-lucide="moon"></i></span><strong>Late Builder</strong><span>Unlocked today</span></div><div class="badge"><span class="badge-icon"><i data-lucide="zap"></i></span><strong>Codex Main</strong><span>share leader</span></div><div class="badge locked"><span class="badge-icon"><i data-lucide="lock"></i></span><strong>High Output</strong><span>300k today</span></div></section></div></main><script>
const API = '/api';
const $ = (selector) => document.querySelector(selector);

function icons() {
  if (window.lucide) lucide.createIcons();
}

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

function renderQuests(quests) {
  const list = quests && quests.length ? quests : [{
    icon: 'timer-reset',
    title: '等待 OpenToken 上报',
    detail: '监听到下一次上传后自动同步',
    rewardLabel: '+0',
    done: false
  }];
  document.querySelector('.quests').innerHTML = list.map((quest) =>
    '<div class="quest' + (quest.done ? ' done' : '') + '"><i data-lucide="' + esc(quest.icon || 'target') + '"></i><div><strong>' + esc(quest.title) + '</strong><span>' + esc(quest.detail) + '</span></div><div class="xp">' + esc(quest.done ? 'done' : quest.rewardLabel) + '</div></div>'
  ).join('');
}

function renderBadges(badges) {
  const list = badges && badges.length ? badges : [{
    icon: 'lock',
    title: 'Waiting',
    detail: 'proxy listening',
    unlocked: false,
    featured: false
  }];
  document.querySelector('.badges').innerHTML = list.slice(0, 4).map((badge) =>
    '<div class="badge' + (badge.featured ? ' featured' : '') + (badge.unlocked ? '' : ' locked') + '"><span class="badge-icon"><i data-lucide="' + esc(badge.unlocked ? badge.icon : 'lock') + '"></i></span><strong>' + esc(badge.title) + '</strong><span>' + esc(badge.detail) + '</span></div>'
  ).join('');
}

function setLoad(isLoading) {
  $('#uploadButton').disabled = isLoading;
  $('#uploadButton').style.opacity = isLoading ? '0.72' : '1';
  $('#uploadLabel').textContent = isLoading ? 'Uploading...' : 'Upload now';
}

function render(data) {
  if (!data || !data.ok) return;
  if (data.waiting) {
    const account = data.account && data.account.connected
      ? 'scys ' + data.account.accountId
      : '未绑定 scys';
    const daemon = data.service && data.service.running ? 'daemon running' : 'service unknown';
    $('#totalValue').textContent = '--';
    $('#rankValue').textContent = '#--';
    document.querySelector('.level-line strong').textContent = 'Builder Lv. --';
    $('#xpText').textContent = '-- / 4,800 XP';
    $('#xpFill').style.width = '4%';
    $('#rankDelta').textContent = '0';
    $('#rankGap').innerHTML = '排名战报<br>等待 OpenToken 上报';
    $('#serviceText').textContent = account + ' · proxy listening · ' + daemon;
    $('#toolList').innerHTML = '<div class="tool"><span>Waiting</span><span></span><span class="tool-value">--</span></div>';
    renderQuests(data.quests);
    renderBadges(data.badges);
    icons();
    return;
  }
  const game = data.game || {};
  const xp = Math.min(game.xp || data.xp || 0, game.xpMax || data.xpMax || 4800);
  const max = game.xpMax || data.xpMax || 4800;
  const total = data.total || 0;
  const rank = data.rank || null;
  const rankDelta = data.rankDelta || 0;
  const account = data.account && data.account.connected
    ? 'scys ' + data.account.accountId
    : '未绑定 scys';
  const daemon = data.service && data.service.running ? 'daemon running' : 'service unknown';
  const battleText = rank === 1
    ? '守住第 1<br>领先 ' + esc(data.nextName || '第 2 名') + ' ' + esc(data.leadOverNextLabel || '0')
    : '距上一名 ' + esc(data.previousName || '') + '<br>还差 ' + esc(data.gapToPreviousLabel || '0');

  $('#totalValue').textContent = data.totalLabel || '0';
  $('#rankValue').textContent = data.rankLabel || (rank ? '#' + rank : '#--');
  document.querySelector('.level-line strong').textContent = game.levelTitle || 'Builder Lv. --';
  $('#xpText').textContent = game.xpLabel || (xp.toLocaleString() + ' / ' + max.toLocaleString() + ' XP');
  $('#xpFill').style.width = Math.max(4, game.xpPct || Math.round((xp / max) * 100)) + '%';
  $('#rankDelta').textContent = rankDelta > 0 ? '+' + rankDelta : String(rankDelta);
  $('#rankGap').innerHTML = battleText;
  $('#serviceText').textContent = account + ' · ' + data.date + ' · ' + daemon;
  $('#toolList').innerHTML = (data.tools || []).map((tool) =>
    '<div class="tool"><span>' + esc(tool.label) + '</span><span class="bar"><i style="width:' + tool.pct + '%"></i></span><span class="tool-value">' + esc(tool.valueLabel) + '</span></div>'
  ).join('') || '<div class="tool"><span>No data</span><span></span><span class="tool-value">--</span></div>';
  renderQuests(data.quests);
  renderBadges(data.badges);
  icons();
}

async function load() {
  try {
    const response = await fetch(API + '/summary');
    render(await response.json());
  } catch (error) {
    $('#serviceText').textContent = 'Live API unavailable';
  }
}

$('#uploadButton').onclick = async () => {
  setLoad(true);
  try {
    await fetch(API + '/upload', { method: 'POST' });
    await load();
  } finally {
    setLoad(false);
  }
};

icons();
load();
setInterval(load, 300000);
</script></body></html>
